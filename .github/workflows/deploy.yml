name: deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers with Wrangler
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke test deployed Worker
        run: |
          curl -fsS --retry 5 --retry-delay 2 --retry-connrefused \
            https://obsidian-mcp.jbmd-creations.workers.dev/.well-known/oauth-authorization-server \
            > /dev/null

          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            --retry 5 --retry-delay 2 --retry-connrefused \
            https://obsidian-mcp.jbmd-creations.workers.dev/mcp)
          if [ "$code" != "401" ]; then
            echo "::error::expected 401 from /mcp, got $code"
            exit 1
          fi
